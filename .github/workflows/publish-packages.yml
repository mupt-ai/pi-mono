name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@mupt-ai"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish @mupt-ai/pi-agent-core
        run: npm run publish:agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @mupt-ai/pi-coding-agent
        run: npm run publish:coding-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
